services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached

    command: sleep infinity
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"

    depends_on:
      - db

  db:
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ktu-tickets

  gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    ports:
      - "4983:4983"
    volumes:
      - drizzle-gateway:/app
    environment:
      DATABASE_URL_ktu-tickets: postgres://postgres:postgres@db:5432/ktu-tickets
    depends_on:
      - db

volumes:
  postgres-data:
  valkey-data:
  drizzle-gateway:
